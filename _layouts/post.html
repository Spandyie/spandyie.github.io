---
layout: default
---

<div class="prompt-line">
  <span class="ps1">guest@spandan <em>~/blog</em> $</span>
  <span class="cmd">cat {{ page.slug }}.md</span>
</div>

<div class="output">
  <div class="post-header">
    <div class="post-title">{{ page.title }}</div>
    <div class="post-meta">
      {{ page.date | date: "%Y-%m-%d" }}
      {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
  </div>
  <hr class="divider">
  <div class="post-body">
    {{ content }}
  </div>
  <hr class="divider">

  <div class="prompt-line">
    <span class="ps1">guest@spandan <em>~/blog</em> $</span>
    <span class="cmd">./comments.sh --thread {{ page.slug }}</span>
  </div>
  <div class="giscus-wrap">
    <script src="https://giscus.app/client.js"
            data-repo="Spandyie/spandyie.github.io"
            data-repo-id="R_kgDON6PzLw"
            data-category="Announcements"
            data-category-id="DIC_kwDON6PzL84C_O8p"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="1"
            data-emit-metadata="0"
            data-input-position="bottom"
            data-theme="transparent_dark"
            data-lang="en"
            crossorigin="anonymous"
            async>
    </script>
  </div>

  <hr class="divider">
  <p><a href="/blog/">← back to _posts/</a></p>
</div>
